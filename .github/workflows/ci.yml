name: CI

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier
        run: npm run format:check

      - name: Build
        run: npm run build
        env:
          # 프로덕션 배포 빌드는 Vercel이 대시보드 환경변수(VITE_API_BASE_URL)로 수행한다.
          # 이 CI 빌드는 컴파일/번들 sanity check 용도라 secret 미설정 시 플레이스홀더로 충분하다.
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL || 'https://ci-placeholder.invalid' }}

      # node 단위 테스트 게이트. vitest.config.ts(node 환경)로 고정해 vite.config.ts의
      # Storybook 브라우저 프로젝트(Playwright)가 딸려오지 않도록 한다 — CI에 Playwright 미설치.
      # 타입체크는 위 build의 `tsc -b`가 이미 담당한다.
      - name: Run unit tests
        run: npx vitest run --config vitest.config.ts
