# Safe to use pull_request_target: script is defined in the base branch,
# and never checks out or references PR head code.
name: PR Type Labeler

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  type-label:
    runs-on: ubuntu-latest
    steps:
      - name: Extract type from PR title and apply label
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;
            const title = context.payload.pull_request.title;

            const prefixMap = {
              feat: 'type/feature',
              fix: 'type/bug',
              refactor: 'type/refactor',
              docs: 'type/docs',
              test: 'type/test',
              chore: 'type/chore',
              ci: 'type/ci',
              style: 'type/style',
              perf: 'type/perf',
            };

            const typeLabels = Object.values(prefixMap);

            const match = title.match(/^(\w+)(\(.+\))?!?:/);
            const prefix = match ? match[1].toLowerCase() : null;
            const targetLabel = prefix ? prefixMap[prefix] : null;

            if (!targetLabel) {
              console.log(`No matching type label for title: "${title}"`);
              return;
            }

            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number });
            const currentLabels = pr.labels.map(l => l.name);
            const existingTypeLabels = currentLabels.filter(l => typeLabels.includes(l));

            for (const label of existingTypeLabels) {
              if (label !== targetLabel) {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: pull_number,
                  name: label,
                });
              }
            }

            if (!existingTypeLabels.includes(targetLabel)) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: pull_number,
                labels: [targetLabel],
              });
            }

            console.log(`PR #${pull_number}: prefix "${prefix}" -> ${targetLabel}`);
