<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f8f8f6" />
    <meta name="robots" content="index, follow" />
    <meta
      name="description"
      content="Shelfeed — 책을 읽고 감상을 기록하고 나누는 독서 피드 서비스"
    />

    <!-- Open Graph (소셜 공유 카드) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Shelfeed" />
    <meta property="og:title" content="Shelfeed" />
    <meta property="og:description" content="책을 읽고 감상을 기록하고 나누는 독서 피드 서비스" />
    <meta property="og:locale" content="ko_KR" />
    <!-- 도메인 확정 후 후속 이슈에서 추가: og:url, canonical, og:image(절대 URL /og-image.png), twitter:image -->

    <!-- Twitter 카드 -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Shelfeed" />
    <meta name="twitter:description" content="책을 읽고 감상을 기록하고 나누는 독서 피드 서비스" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <title>Shelfeed</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
